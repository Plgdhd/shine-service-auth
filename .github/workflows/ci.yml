name: Shine Auth Service CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  auth-service-test:
    runs-on: ubuntu-latest

    # services:
    #   postgres:
    #     image: postgres:16-alpine
    #     env:
    #       POSTGRES_DB: keycloak_test
    #       POSTGRES_USER: keycloak
    #       POSTGRES_PASSWORD: keycloak
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build & Test with JaCoCo
        run: mvn -B clean verify
        #   SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/keycloak_test
        #   SPRING_DATASOURCE_USERNAME: keycloak
        #   SPRING_DATASOURCE_PASSWORD: keycloak

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-jacoco-report
          path: target/site/jacoco/jacoco.xml

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/